name: 'Tag stale PRs'
on:
  schedule:
    - cron: '30 1 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: -1
          days-before-pr-stale: 30
          days-before-close: -1
